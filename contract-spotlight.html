<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Spotlight — Upper Hand Fantasy</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink:       #ED0A73;
  --blue:       #339AE9;
  --white:      #FFFFFF;
  --bg:         #061525;
  --bg-card:    #0d2a47;
  --border-dim: #1a3a5c;
  --text-muted: #5a8ab0;
  --text-dim:   #2d4a63;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--white);
  font-family: 'Roboto', sans-serif;
  overflow-x: hidden;
}

.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(6,21,37,0.94);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 100;
}
.nav-back {
  display: flex; align-items: center; gap: 7px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px; font-weight: 500;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--white); }
.nav-back svg { width: 15px; height: 15px; }
.nav-sep { width: 1px; height: 20px; background: var(--border-dim); }
.nav-title {
  font-family: 'Oswald', sans-serif;
  font-size: 15px; font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--white);
}

.main {
  margin-top: 56px;
  display: grid;
  grid-template-columns: 430px 1fr;
  min-height: calc(100vh - 56px);
}

.form-panel {
  border-right: 1px solid var(--border-dim);
  padding: 26px 22px 40px;
  overflow-y: auto;
  background: rgba(13,42,71,0.18);
}

.sec-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 9px;
}

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 5px;
  letter-spacing: 0.03em;
}
.form-group input {
  width: 100%;
  background: rgba(13,42,71,0.75);
  border: 1px solid var(--border-dim);
  border-radius: 6px;
  color: var(--white);
  font-family: 'Roboto', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--blue); }

.form-row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.form-row-2 .form-group { margin-bottom: 0; }

hr.divider {
  border: none;
  border-top: 1px solid var(--border-dim);
  margin: 16px 0;
}

.btn-row { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 22px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px;
  border-radius: 8px; border: none;
  font-family: 'Roboto', sans-serif;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.04em;
}
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn-primary { background: var(--pink); color: var(--white); }
.btn-primary:hover { background: #c8086a; }
.btn-export {
  background: rgba(51,154,233,0.1);
  border: 1px solid rgba(51,154,233,0.35);
  color: var(--blue);
}
.btn-export:hover { background: rgba(51,154,233,0.2); }
.exp-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  margin-top: 14px;
}
.rec-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  letter-spacing: 0.05em;
}
.rec-idle { background: rgba(90,138,176,0.08); color: var(--text-dim); border: 1px solid var(--border-dim); }
.rec-live { background: rgba(237,10,115,0.12); color: var(--pink); border: 1px solid rgba(237,10,115,0.3); }

.preview-panel {
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 36px;
  overflow-y: auto;
}
.preview-hdr {
  font-family: 'Oswald', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.canvas-row {
  display: flex;
  gap: 36px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.canvas-wrap { display: flex; flex-direction: column; gap: 8px; }
.canvas-lbl {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-dim);
}
.canvas-outer {
  transform-origin: top left;
  position: relative;
}
.canvas-outer canvas {
  display: block;
  border-radius: 8px;
  border: 1px solid var(--border-dim);
}

  /* ─── FFmpeg Conversion Modal ─────────────────────────────────────────────── */
  #ffmpeg-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:9999; align-items:center; justify-content:center; padding:24px; }
  #ffmpeg-modal.open { display:flex; }
  #ffmpeg-modal-box { background:#0d1f33; border:1px solid #1a3a5c; border-radius:8px; padding:24px; max-width:640px; width:100%; }
  #ffmpeg-modal h3 { font-family:'Oswald',sans-serif; color:#ED0A73; font-size:15px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
  #ffmpeg-modal p { font-size:13px; color:#aaa; margin-bottom:12px; line-height:1.5; }
  #ffmpeg-cmd-block { background:#060e18; border:1px solid #1a3a5c; border-radius:4px; padding:12px; font-size:12px; color:#7EC8E3; white-space:pre-wrap; word-break:break-all; margin-bottom:14px; font-family:monospace; }
  #ffmpeg-modal-btns { display:flex; gap:10px; }
  .ffmpeg-btn { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:7px 16px; border-radius:4px; border:none; cursor:pointer; transition:opacity 0.2s; }
  .ffmpeg-btn:hover { opacity:0.8; }
  .ffmpeg-btn-copy { background:#339AE9; color:#fff; }
  .ffmpeg-btn-dismiss { background:#1a3a5c; color:#ccc; }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="index.html">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 3L5 8l5 5"/></svg>
    Hub
  </a>
  <div class="nav-sep"></div>
  <span class="nav-title">Contract Spotlight</span>
</nav>

<div class="main">

  <aside class="form-panel">
    <div class="sec-label">Player Info</div>

    <div class="form-row-2" style="margin-bottom:14px;">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="f-first" value="SAQUON">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="f-last" value="BARKLEY">
      </div>
    </div>

    <div class="form-row-2" style="margin-bottom:14px;">
      <div class="form-group">
        <label>Position</label>
        <input type="text" id="f-pos" value="RB">
      </div>
      <div class="form-group">
        <label>Team</label>
        <input type="text" id="f-team" value="Philadelphia Eagles">
      </div>
    </div>

    <div class="form-group">
      <label>Photo URL</label>
      <input type="text" id="f-photo" value="https://a.espncdn.com/i/headshots/nfl/players/full/3054211.png">
    </div>

    <hr class="divider">
    <div class="sec-label">Contract</div>

    <div class="form-row-2" style="margin-bottom:14px;">
      <div class="form-group">
        <label>Years</label>
        <input type="number" id="f-years" value="3" min="1" max="10">
      </div>
      <div class="form-group">
        <label>APY (e.g. $14.1M)</label>
        <input type="text" id="f-apy" value="$14.1M">
      </div>
    </div>

    <hr class="divider">
    <div class="sec-label">Key Stats (3 pills)</div>

    <div class="form-row-2" style="margin-bottom:10px;">
      <div class="form-group">
        <label>Stat 1 Label</label>
        <input type="text" id="s1-label" value="PPR PTS/GAME">
      </div>
      <div class="form-group">
        <label>Stat 1 Value</label>
        <input type="text" id="s1-val" value="26.5">
      </div>
    </div>
    <div class="form-row-2" style="margin-bottom:10px;">
      <div class="form-group">
        <label>Stat 2 Label</label>
        <input type="text" id="s2-label" value="TARGET SHARE">
      </div>
      <div class="form-group">
        <label>Stat 2 Value</label>
        <input type="text" id="s2-val" value="22%">
      </div>
    </div>
    <div class="form-row-2" style="margin-bottom:14px;">
      <div class="form-group">
        <label>Stat 3 Label</label>
        <input type="text" id="s3-label" value="RZ TARGETS">
      </div>
      <div class="form-group">
        <label>Stat 3 Value</label>
        <input type="text" id="s3-val" value="8">
      </div>
    </div>

    <hr class="divider">
    <div class="sec-label">Attribution</div>
    <div class="form-group">
      <label>Footer Text</label>
      <input type="text" id="f-attr" value="@upperhandfantasy">
    </div>

    <div class="exp-label">Export</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-regen">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M13.5 8A5.5 5.5 0 112.5 5.5"/><path d="M2.5 2v3.5H6"/></svg>
        Regenerate
      </button>
    </div>
    <div class="btn-row">
      <button class="btn btn-export" id="btn-dl-sq">PNG 1:1</button>
      <button class="btn btn-export" id="btn-dl-rl">PNG 9:16</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-export" id="btn-vid-sq">
        <span id="rec-sq" class="rec-badge rec-idle">REC</span> Video 1:1
      </button>
      <button class="btn btn-export" id="btn-vid-rl">
        <span id="rec-rl" class="rec-badge rec-idle">REC</span> Video 9:16
      </button>
    </div>
  </aside>

  <section class="preview-panel">
    <div>
      <div class="preview-hdr">Preview</div>
      <div class="canvas-row">
        <div class="canvas-wrap">
          <div class="canvas-lbl">1:1 Square</div>
          <div class="canvas-outer" id="sq-outer">
            <canvas id="squareCanvas" width="1080" height="1080"></canvas>
          </div>
        </div>
        <div class="canvas-wrap">
          <div class="canvas-lbl">9:16 Reels</div>
          <div class="canvas-outer" id="rl-outer">
            <canvas id="reelsCanvas" width="1080" height="1920"></canvas>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const PINK        = '#ED0A73';
const BLUE        = '#339AE9';
const WHITE       = '#FFFFFF';
const BG          = '#061525';
const BG_CARD     = '#0d2a47';
const BORDER_DIM  = '#1a3a5c';
const TEXT_MUTED  = '#5a8ab0';
const TEXT_DIM    = '#2d4a63';
const TOTAL       = 250;

// ── IMAGE CACHE ────────────────────────────────────────────────────────────────
const imgCache = {};
function loadImg(url, cb) {
  if (!url) { cb(null); return; }
  if (imgCache[url]) { cb(imgCache[url]); return; }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { imgCache[url] = img; cb(img); };
  img.onerror = () => { imgCache[url] = null; cb(null); };
  img.src = url;
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function easeOut(t) { return 1 - Math.pow(1 - Math.min(Math.max(t, 0), 1), 3); }
function tween(f, start, dur) { return easeOut(Math.min(1, Math.max(0, (f - start) / dur))); }

function countUp(raw, progress) {
  const s = String(raw).trim();
  const m = s.match(/^([^0-9\-]*)(-?[0-9]+(?:\.[0-9]+)?)(.*)$/);
  if (!m) return s;
  const [, pre, numStr, suf] = m;
  const num = parseFloat(numStr);
  const cur = num * easeOut(progress);
  const dec = numStr.includes('.') ? numStr.split('.')[1].length : 0;
  return pre + cur.toFixed(dec) + suf;
}

function fitText(ctx, text, maxW, size, weight, family) {
  ctx.font = `${weight} ${size}px ${family}`;
  while (ctx.measureText(text).width > maxW && size > 16) {
    size -= 2;
    ctx.font = `${weight} ${size}px ${family}`;
  }
  return size;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPhoto(ctx, img, x, y, w, h, borderW, borderColor) {
  ctx.save();
  ctx.fillStyle = borderColor;
  ctx.fillRect(x - borderW, y - borderW, w + borderW * 2, h + borderW * 2);
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  if (img) {
    const sc = Math.max(w / img.width, h / img.height);
    const sw = img.width * sc, sh = img.height * sc;
    ctx.drawImage(img, x + (w - sw) / 2, y + (h - sh) / 2, sw, sh);
  } else {
    ctx.fillStyle = BG_CARD; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = BORDER_DIM;
    ctx.font = `700 ${Math.round(w * 0.3)}px Oswald`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', x + w / 2, y + h / 2);
  }
  ctx.restore();
}

// ── STATE ──────────────────────────────────────────────────────────────────────
let playerImg = null;
let animId = null;

function getData() {
  return {
    first:    document.getElementById('f-first').value,
    last:     document.getElementById('f-last').value,
    pos:      document.getElementById('f-pos').value,
    team:     document.getElementById('f-team').value,
    photoUrl: document.getElementById('f-photo').value,
    years:    document.getElementById('f-years').value,
    apy:      document.getElementById('f-apy').value,
    stats: [
      { label: document.getElementById('s1-label').value, val: document.getElementById('s1-val').value },
      { label: document.getElementById('s2-label').value, val: document.getElementById('s2-val').value },
      { label: document.getElementById('s3-label').value, val: document.getElementById('s3-val').value },
    ],
    attr: document.getElementById('f-attr').value,
  };
}

function contractString(data) {
  return `${data.years} YRS  ·  ${data.apy} / YR`;
}

// ── DRAW STAT PILL ─────────────────────────────────────────────────────────────
function drawStatPill(ctx, x, y, w, h, label, valRaw, progress) {
  // bg
  roundRect(ctx, x, y, w, h, 6);
  ctx.fillStyle = 'rgba(13,42,71,0.7)'; ctx.fill();
  ctx.strokeStyle = BORDER_DIM; ctx.lineWidth = 1; ctx.stroke();

  // Thin vertical divider
  const divX = x + w * 0.62;
  ctx.strokeStyle = BORDER_DIM; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(divX, y + 8); ctx.lineTo(divX, y + h - 8);
  ctx.stroke();

  // Label
  ctx.font = '500 15px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label.toUpperCase(), x + 18, y + h / 2);

  // Value
  const valStr = countUp(valRaw, progress);
  ctx.fillStyle = WHITE;
  fitText(ctx, valStr, w * 0.35, 28, '700', 'Oswald');
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText(valStr, x + w - 14, y + h / 2);
}

// ── DRAW REELS STAT PILL ───────────────────────────────────────────────────────
function drawStatPillLarge(ctx, x, y, w, h, label, valRaw, progress) {
  roundRect(ctx, x, y, w, h, 8);
  ctx.fillStyle = 'rgba(13,42,71,0.7)'; ctx.fill();
  ctx.strokeStyle = BORDER_DIM; ctx.lineWidth = 1; ctx.stroke();

  const divX = x + w * 0.62;
  ctx.strokeStyle = BORDER_DIM; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(divX, y + 10); ctx.lineTo(divX, y + h - 10);
  ctx.stroke();

  ctx.font = '500 17px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label.toUpperCase(), x + 22, y + h / 2);

  const valStr = countUp(valRaw, progress);
  ctx.fillStyle = WHITE;
  fitText(ctx, valStr, w * 0.35, 34, '700', 'Oswald');
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText(valStr, x + w - 18, y + h / 2);
}

// ── DRAW SQUARE (1080x1080) ────────────────────────────────────────────────────
function drawSquare(ctx, data, frame) {
  const W = 1080, H = 1080;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
  let g = ctx.createRadialGradient(0, 0, 0, 0, 0, 600);
  g.addColorStop(0, 'rgba(51,154,233,0.08)');
  g.addColorStop(1, 'rgba(6,21,37,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  g = ctx.createRadialGradient(W, H, 0, W, H, 600);
  g.addColorStop(0, 'rgba(237,10,115,0.07)');
  g.addColorStop(1, 'rgba(6,21,37,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Pink top border
  ctx.fillStyle = PINK; ctx.fillRect(0, 0, W, 6);

  // Left blue accent bar
  ctx.fillStyle = TEXT_DIM; ctx.fillRect(0, 6, 4, 550);

  // Photo (right side, slides from right)
  const photoT = tween(frame, 0, 80);
  const photoOffX = (1 - photoT) * 60;
  ctx.save();
  ctx.globalAlpha = photoT;
  ctx.translate(photoOffX, 0);
  drawPhoto(ctx, playerImg, 568, 48, 462, 612, 6, PINK);
  ctx.restore();

  // First name
  const firstT = tween(frame, 15, 60);
  const firstOffY = (1 - firstT) * 50;
  ctx.save();
  ctx.globalAlpha = firstT;
  ctx.translate(0, firstOffY);
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  fitText(ctx, data.first.toUpperCase(), 468, 84, '700', 'Oswald');
  ctx.fillText(data.first.toUpperCase(), 60, 174);
  ctx.restore();

  // Last name
  const lastT = tween(frame, 25, 60);
  const lastOffY = (1 - lastT) * 50;
  ctx.save();
  ctx.globalAlpha = lastT;
  ctx.translate(0, lastOffY);
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  fitText(ctx, data.last.toUpperCase(), 468, 84, '700', 'Oswald');
  ctx.fillText(data.last.toUpperCase(), 60, 268);
  ctx.restore();

  // Position badge
  const posT = tween(frame, 50, 40);
  const posOffY = (1 - posT) * -20;
  ctx.save();
  ctx.globalAlpha = posT;
  ctx.translate(0, posOffY);
  const posText = data.pos.toUpperCase();
  ctx.font = '700 13px Roboto';
  const posW = ctx.measureText(posText).width + 22;
  roundRect(ctx, 60, 60, posW, 28, 5);
  ctx.fillStyle = 'rgba(51,154,233,0.15)'; ctx.fill();
  ctx.strokeStyle = BLUE; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = BLUE;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(posText, 71, 74);
  ctx.restore();

  // Team
  const teamT = tween(frame, 65, 40);
  const teamOffY = (1 - teamT) * 30;
  ctx.save();
  ctx.globalAlpha = teamT;
  ctx.translate(0, teamOffY);
  ctx.font = '400 22px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(data.team, 60, 330);
  ctx.restore();

  // Contract block (divider, label, value)
  const contractT = tween(frame, 95, 50);
  const contractOffY = (1 - contractT) * 30;
  ctx.save();
  ctx.globalAlpha = contractT;
  ctx.translate(0, contractOffY);

  // Thin divider
  ctx.strokeStyle = BORDER_DIM; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, 375); ctx.lineTo(528, 375); ctx.stroke();

  // "CONTRACT" label
  ctx.font = '700 11px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('CONTRACT', 60, 400);

  // Contract value
  const cStr = contractString(data);
  ctx.fillStyle = PINK;
  fitText(ctx, cStr, 468, 44, '700', 'Oswald');
  ctx.fillText(cStr, 60, 456);

  ctx.restore();

  // Stat pills
  const statStarts = [125, 145, 165];
  data.stats.forEach((st, i) => {
    const pillT = tween(frame, statStarts[i], 50);
    const pillOffX = (1 - pillT) * -40;
    ctx.save();
    ctx.globalAlpha = pillT;
    ctx.translate(pillOffX, 0);
    const py = 510 + i * 72;
    drawStatPill(ctx, 60, py, 468, 58, st.label, st.val, pillT);
    ctx.restore();
  });

  // Footer
  const footT = tween(frame, 200, 40);
  ctx.save();
  ctx.globalAlpha = footT * 0.45;
  ctx.font = '300 19px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(data.attr, 540, 1042);
  ctx.restore();
}

// ── DRAW REELS (1080x1920) ─────────────────────────────────────────────────────
function drawReels(ctx, data, frame) {
  const W = 1080, H = 1920;
  ctx.clearRect(0, 0, W, H);

  // Full uniform background
  ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
  let g = ctx.createRadialGradient(0, 0, 0, 0, 0, 900);
  g.addColorStop(0, 'rgba(51,154,233,0.09)');
  g.addColorStop(1, 'rgba(6,21,37,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  g = ctx.createRadialGradient(W, H, 0, W, H, 900);
  g.addColorStop(0, 'rgba(237,10,115,0.08)');
  g.addColorStop(1, 'rgba(6,21,37,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Pink top border
  ctx.fillStyle = PINK; ctx.fillRect(0, 0, W, 8);

  // Photo - centered
  const photoT = tween(frame, 0, 80);
  const photoOffX = (1 - photoT) * 60;
  ctx.save();
  ctx.globalAlpha = photoT;
  ctx.translate(photoOffX, 0);
  drawPhoto(ctx, playerImg, 220, 268, 640, 538, 8, PINK);
  ctx.restore();

  // Position badge
  const posT = tween(frame, 50, 40);
  const posOffY = (1 - posT) * -20;
  ctx.save();
  ctx.globalAlpha = posT;
  ctx.translate(0, posOffY);
  const posText = data.pos.toUpperCase();
  ctx.font = '700 14px Roboto';
  const posW = ctx.measureText(posText).width + 28;
  const posX = 540 - posW / 2;
  roundRect(ctx, posX, 842, posW, 32, 6);
  ctx.fillStyle = 'rgba(51,154,233,0.15)'; ctx.fill();
  ctx.strokeStyle = BLUE; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = BLUE;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(posText, 540, 858);
  ctx.restore();

  // First name
  const firstT = tween(frame, 15, 60);
  const firstOffY2 = (1 - firstT) * 50;
  ctx.save();
  ctx.globalAlpha = firstT;
  ctx.translate(0, firstOffY2);
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  fitText(ctx, data.first.toUpperCase(), 900, 88, '700', 'Oswald');
  ctx.fillText(data.first.toUpperCase(), 540, 960);
  ctx.restore();

  // Last name
  const lastT = tween(frame, 25, 60);
  const lastOffY2 = (1 - lastT) * 50;
  ctx.save();
  ctx.globalAlpha = lastT;
  ctx.translate(0, lastOffY2);
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  fitText(ctx, data.last.toUpperCase(), 900, 88, '700', 'Oswald');
  ctx.fillText(data.last.toUpperCase(), 540, 1062);
  ctx.restore();

  // Team
  const teamT2 = tween(frame, 65, 40);
  const teamOffY2 = (1 - teamT2) * 30;
  ctx.save();
  ctx.globalAlpha = teamT2;
  ctx.translate(0, teamOffY2);
  ctx.font = '400 26px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText(data.team, 540, 1118);
  ctx.restore();

  // Contract block
  const contractT2 = tween(frame, 95, 50);
  const contractOffY2 = (1 - contractT2) * 30;
  ctx.save();
  ctx.globalAlpha = contractT2;
  ctx.translate(0, contractOffY2);

  ctx.strokeStyle = BORDER_DIM; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(100, 1155); ctx.lineTo(980, 1155); ctx.stroke();

  ctx.font = '700 12px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('CONTRACT', 540, 1178);

  const cStr = contractString(data);
  ctx.fillStyle = PINK;
  fitText(ctx, cStr, 880, 50, '700', 'Oswald');
  ctx.textAlign = 'center';
  ctx.fillText(cStr, 540, 1240);

  ctx.restore();

  // Stat pills
  const statStartsR = [125, 145, 165];
  data.stats.forEach((st, i) => {
    const pillT = tween(frame, statStartsR[i], 50);
    const pillOffX = (1 - pillT) * -40;
    ctx.save();
    ctx.globalAlpha = pillT;
    ctx.translate(pillOffX, 0);
    const py = 1298 + i * 86;
    drawStatPillLarge(ctx, 80, py, 920, 72, st.label, st.val, pillT);
    ctx.restore();
  });

  // Footer
  const footT2 = tween(frame, 200, 40);
  ctx.save();
  ctx.globalAlpha = footT2 * 0.45;
  ctx.font = '300 22px Roboto';
  ctx.fillStyle = TEXT_MUTED;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(data.attr, 540, 1858);
  ctx.restore();
}

// ── ANIMATION LOOP ─────────────────────────────────────────────────────────────
function generate() {
  if (animId) cancelAnimationFrame(animId);
  const sqCtx = document.getElementById('squareCanvas').getContext('2d');
  const rlCtx = document.getElementById('reelsCanvas').getContext('2d');
  const data = getData();
  let frame = 0;

  function tick() {
    drawSquare(sqCtx, data, frame);
    drawReels(rlCtx, data, frame);
    if (frame < TOTAL) {
      frame++;
      animId = requestAnimationFrame(tick);
    }
  }
  animId = requestAnimationFrame(tick);
}

// ── SCALE ─────────────────────────────────────────────────────────────────────
function scaleCanvases() {
  const availW = window.innerWidth - 460;
  const sqScale = Math.min(0.40, (availW * 0.48) / 1080);
  const rlScale = sqScale * (1080 / 1920) * 0.88;

  const sqOuter = document.getElementById('sq-outer');
  sqOuter.style.transform = `scale(${sqScale})`;
  sqOuter.style.width = '1080px';
  sqOuter.style.height = '1080px';
  sqOuter.parentElement.style.width = Math.round(1080 * sqScale) + 'px';
  sqOuter.parentElement.style.height = Math.round(1080 * sqScale) + 'px';

  const rlOuter = document.getElementById('rl-outer');
  rlOuter.style.transform = `scale(${rlScale})`;
  rlOuter.style.width = '1080px';
  rlOuter.style.height = '1920px';
  rlOuter.parentElement.style.width = Math.round(1080 * rlScale) + 'px';
  rlOuter.parentElement.style.height = Math.round(1920 * rlScale) + 'px';
}

// ── DEBOUNCE ──────────────────────────────────────────────────────────────────
function scheduleRegen() {
  clearTimeout(window._rt);
  window._rt = setTimeout(generate, 300);
}

// ── VIDEO EXPORT ──────────────────────────────────────────────────────────────
function exportVideo(canvasId, recBadgeId) {
  const canvas = document.getElementById(canvasId);
  const badge = document.getElementById(recBadgeId);
  const isSquare = canvasId === 'squareCanvas';
  const sqCtx = document.getElementById('squareCanvas').getContext('2d');
  const rlCtx = document.getElementById('reelsCanvas').getContext('2d');
  const data = getData();
  const mime = ['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm'].find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
  const ext  = mime.startsWith('video/mp4') ? 'mp4' : 'webm';
  const stream = canvas.captureStream(60);
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 25_000_000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const filename = `contract-spotlight-${isSquare ? '1x1' : '9x16'}.${ext}`;
    a.download = filename;
    a.click();
    showFFmpegModal(filename, 60);
    badge.className = 'rec-badge rec-idle';
    badge.textContent = 'REC';
  };

  badge.className = 'rec-badge rec-live';
  badge.textContent = 'REC';

  if (animId) cancelAnimationFrame(animId);
  let frame = 0;
  rec.start();

  function tick() {
    drawSquare(sqCtx, data, frame);
    drawReels(rlCtx, data, frame);
    if (frame < TOTAL) {
      frame++;
      requestAnimationFrame(tick);
    }
  }
  requestAnimationFrame(tick);
  setTimeout(() => rec.stop(), (TOTAL / 60 + 0.5) * 1000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  scaleCanvases();
  window.addEventListener('resize', scaleCanvases);

  const photoInput = document.getElementById('f-photo');
  loadImg(photoInput.value, img => {
    playerImg = img;
    generate();
  });

  photoInput.addEventListener('input', () => {
    loadImg(photoInput.value, img => {
      playerImg = img;
      generate();
    });
  });

  document.querySelectorAll('input:not(#f-photo)').forEach(el => {
    el.addEventListener('input', scheduleRegen);
  });

  document.getElementById('btn-regen').addEventListener('click', generate);

  document.getElementById('btn-dl-sq').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = document.getElementById('squareCanvas').toDataURL('image/png');
    a.download = 'contract-spotlight-1x1.png'; a.click();
  });
  document.getElementById('btn-dl-rl').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = document.getElementById('reelsCanvas').toDataURL('image/png');
    a.download = 'contract-spotlight-9x16.png'; a.click();
  });
  document.getElementById('btn-vid-sq').addEventListener('click', () => exportVideo('squareCanvas', 'rec-sq'));
  document.getElementById('btn-vid-rl').addEventListener('click', () => exportVideo('reelsCanvas', 'rec-rl'));
});

// ─── FFmpeg Conversion Modal ──────────────────────────────────────────────────
function showFFmpegModal(filename, fps) {
  const base = filename.replace(/\.(webm|mp4)$/, '');
  const ext  = filename.split('.').pop();
  const out  = base + '-davinci.mp4';
  const cmd  = `ffmpeg -i "${filename}" \\\n  -c:v libx264 \\\n  -profile:v high \\\n  -level:v 4.2 \\\n  -pix_fmt yuv420p \\\n  -crf 18 \\\n  -r ${fps} \\\n  -c:a aac \\\n  -movflags +faststart \\\n  "${out}"`;
  document.getElementById('ffmpeg-codec-note').textContent = ext.toUpperCase() + ' (' + (ext === 'webm' ? 'VP9' : 'H.264') + ')';
  document.getElementById('ffmpeg-cmd-block').textContent = cmd;
  document.getElementById('ffmpeg-modal').classList.add('open');
}

    <div id="ffmpeg-modal-btns">

      <button class="ffmpeg-btn ffmpeg-btn-dismiss" onclick="document.getElementById('ffmpeg-modal').classList.remove('open')">Dismiss</button>
    </div>
  </div>
</div>
