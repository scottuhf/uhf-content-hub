<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Sort — Upper Hand Fantasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ED0A73;
    --blue: #339AE9;
    --white: #FFFFFF;
    --bg: #061525;
    --border: #1a3a5c;
    --muted: #5a8ab0;
    --dim: #2d4a63;
    --panel-bg: #0a1f35;
    --input-bg: #0d2a47;
    --nav-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: 'Roboto', sans-serif; min-height: 100vh; }

  .nav {
    position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
    background: rgba(6,21,37,0.97); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; z-index: 100;
    gap: 16px;
  }
  .nav-title { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: var(--white); letter-spacing: 0.04em; }
  .nav-sub { font-size: 13px; color: var(--muted); }
  .nav-accent { color: var(--pink); }

  .main-layout { display: flex; min-height: 100vh; padding-top: var(--nav-h); }

  .form-panel {
    width: 440px; min-width: 440px; background: var(--panel-bg);
    border-right: 1px solid var(--border); padding: 24px 20px;
    overflow-y: auto; height: calc(100vh - var(--nav-h)); position: sticky; top: var(--nav-h);
  }

  .preview-panel {
    flex: 1; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 24px; overflow-y: auto;
  }

  .section-label {
    font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 600;
    color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 10px; margin-top: 20px;
  }
  .section-label:first-child { margin-top: 0; }

  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--white); padding: 7px 10px; border-radius: 6px; font-size: 13px;
    font-family: 'Roboto', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
  .form-group select option { background: var(--input-bg); }

  .player-row {
    background: rgba(13,42,71,0.5); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
  }
  .player-row-header {
    font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--muted); letter-spacing: 0.06em; margin-bottom: 8px;
  }
  .row-grid-4 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 6px; }

  .type-toggle {
    display: flex; gap: 0; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px; margin-bottom: 18px;
  }
  .type-toggle button {
    flex: 1; padding: 7px 10px; border: none; border-radius: 6px;
    font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; background: transparent; color: var(--muted); transition: all 0.2s;
  }
  .type-toggle button.active { background: var(--blue); color: var(--white); }

  .btn { padding: 9px 16px; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Roboto', sans-serif; transition: all 0.18s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--blue); color: var(--white); }
  .btn-primary:hover { background: #4aaaf0; }
  .btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
  .btn-export { background: rgba(237,10,115,0.12); color: var(--pink); border: 1px solid var(--pink); }
  .btn-export:hover { background: rgba(237,10,115,0.22); }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

  .rec-badge {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    padding: 2px 6px; border-radius: 4px; line-height: 1.4;
  }
  .rec-idle { background: rgba(237,10,115,0.2); color: var(--pink); }
  .rec-active { background: var(--pink); color: var(--white); animation: recPulse 1s infinite; }
  @keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .canvas-wrap { position: relative; display: inline-block; }
  .canvas-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  .canvases-row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

  canvas { display: block; }
  .outer-wrap { display: inline-block; }

  /* ─── FFmpeg Conversion Modal ─────────────────────────────────────────────── */
  #ffmpeg-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:9999; align-items:center; justify-content:center; padding:24px; }
  #ffmpeg-modal.open { display:flex; }
  #ffmpeg-modal-box { background:#0d1f33; border:1px solid #1a3a5c; border-radius:8px; padding:24px; max-width:640px; width:100%; }
  #ffmpeg-modal h3 { font-family:'Oswald',sans-serif; color:#ED0A73; font-size:15px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
  #ffmpeg-modal p { font-size:13px; color:#aaa; margin-bottom:12px; line-height:1.5; }
  #ffmpeg-cmd-block { background:#060e18; border:1px solid #1a3a5c; border-radius:4px; padding:12px; font-size:12px; color:#7EC8E3; white-space:pre-wrap; word-break:break-all; margin-bottom:14px; font-family:monospace; }
  #ffmpeg-modal-btns { display:flex; gap:10px; }
  .ffmpeg-btn { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:7px 16px; border-radius:4px; border:none; cursor:pointer; transition:opacity 0.2s; }
  .ffmpeg-btn:hover { opacity:0.8; }
  .ffmpeg-btn-copy { background:#339AE9; color:#fff; }
  .ffmpeg-btn-dismiss { background:#1a3a5c; color:#ccc; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-title">STAT <span class="nav-accent">SORT</span></span>
  <span class="nav-sub">Upper Hand Fantasy</span>
</nav>

<div class="main-layout">
  <!-- FORM PANEL -->
  <div class="form-panel">
    <div class="section-label">Card Type</div>
    <div class="type-toggle" id="typeToggle">
      <button class="active" onclick="switchType('scrambled')">Scrambled</button>
      <button onclick="switchType('sorted')">Sorted</button>
    </div>

    <div class="section-label">Stat</div>
    <div class="form-group">
      <label>Stat Label</label>
      <input type="text" id="statLabel" value="2024 RUSHING YARDS" oninput="debouncedGenerate()">
    </div>

    <div class="form-group">
      <label>Number of Players</label>
      <select id="numPlayers" onchange="updatePlayerRows(); debouncedGenerate();">
        <option value="4">4 Players</option>
        <option value="5">5 Players</option>
        <option value="6" selected>6 Players</option>
      </select>
    </div>

    <div class="section-label">Players</div>

    <!-- Player rows -->
    <div id="playerRows">
      <!-- Row 1 -->
      <div class="player-row" id="prow-0">
        <div class="player-row-header">PLAYER 1</div>
        <div class="row-grid-4">
          <div class="form-group" style="margin:0"><label>Name</label><input type="text" id="p0-name" value="SAQUON BARKLEY" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Team</label><input type="text" id="p0-team" value="PHI" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Value</label><input type="text" id="p0-val" value="2,005" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Photo ID</label><input type="text" id="p0-photo" value="3054211" oninput="debouncedGenerate()" placeholder="ESPN ID"></div>
        </div>
      </div>
      <!-- Row 2 -->
      <div class="player-row" id="prow-1">
        <div class="player-row-header">PLAYER 2</div>
        <div class="row-grid-4">
          <div class="form-group" style="margin:0"><label>Name</label><input type="text" id="p1-name" value="DERRICK HENRY" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Team</label><input type="text" id="p1-team" value="BAL" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Value</label><input type="text" id="p1-val" value="1,921" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Photo ID</label><input type="text" id="p1-photo" value="2576336" oninput="debouncedGenerate()" placeholder="ESPN ID"></div>
        </div>
      </div>
      <!-- Row 3 -->
      <div class="player-row" id="prow-2">
        <div class="player-row-header">PLAYER 3</div>
        <div class="row-grid-4">
          <div class="form-group" style="margin:0"><label>Name</label><input type="text" id="p2-name" value="JAHMYR GIBBS" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Team</label><input type="text" id="p2-team" value="DET" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Value</label><input type="text" id="p2-val" value="1,673" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Photo ID</label><input type="text" id="p2-photo" value="4361566" oninput="debouncedGenerate()" placeholder="ESPN ID"></div>
        </div>
      </div>
      <!-- Row 4 -->
      <div class="player-row" id="prow-3">
        <div class="player-row-header">PLAYER 4</div>
        <div class="row-grid-4">
          <div class="form-group" style="margin:0"><label>Name</label><input type="text" id="p3-name" value="JOE MIXON" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Team</label><input type="text" id="p3-team" value="HOU" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Value</label><input type="text" id="p3-val" value="1,407" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Photo ID</label><input type="text" id="p3-photo" value="3054239" oninput="debouncedGenerate()" placeholder="ESPN ID"></div>
        </div>
      </div>
      <!-- Row 5 -->
      <div class="player-row" id="prow-4">
        <div class="player-row-header">PLAYER 5</div>
        <div class="row-grid-4">
          <div class="form-group" style="margin:0"><label>Name</label><input type="text" id="p4-name" value="JAMES COOK" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Team</label><input type="text" id="p4-team" value="BUF" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Value</label><input type="text" id="p4-val" value="1,009" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Photo ID</label><input type="text" id="p4-photo" value="4240703" oninput="debouncedGenerate()" placeholder="ESPN ID"></div>
        </div>
      </div>
      <!-- Row 6 -->
      <div class="player-row" id="prow-5">
        <div class="player-row-header">PLAYER 6</div>
        <div class="row-grid-4">
          <div class="form-group" style="margin:0"><label>Name</label><input type="text" id="p5-name" value="DE'VON ACHANE" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Team</label><input type="text" id="p5-team" value="MIA" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Value</label><input type="text" id="p5-val" value="950" oninput="debouncedGenerate()"></div>
          <div class="form-group" style="margin:0"><label>Photo ID</label><input type="text" id="p5-photo" value="4685671" oninput="debouncedGenerate()" placeholder="ESPN ID"></div>
        </div>
      </div>
    </div>

    <div class="section-label">Attribution</div>
    <div class="form-group">
      <input type="text" id="attribution" value="@upperhandfantasy" oninput="debouncedGenerate()">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="generate()">Generate</button>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn btn-outline" onclick="exportPNG('square')">PNG 1:1</button>
      <button class="btn btn-outline" onclick="exportPNG('reels')">PNG 9:16</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-export" onclick="toggleRecord('square')">
        <span class="rec-badge rec-idle" id="recBadge-square">REC</span> Video 1:1
      </button>
      <button class="btn btn-export" onclick="toggleRecord('reels')">
        <span class="rec-badge rec-idle" id="recBadge-reels">REC</span> Video 9:16
      </button>
    </div>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="canvases-row">
      <div>
        <div class="canvas-label">Square 1:1</div>
        <div class="outer-wrap" id="squareOuterWrap">
          <div id="squareOuter" class="outer-wrap">
            <canvas id="squareCanvas" width="1080" height="1080"></canvas>
          </div>
        </div>
      </div>
      <div>
        <div class="canvas-label">Reels 9:16</div>
        <div class="outer-wrap" id="reelsOuterWrap">
          <div id="reelsOuter" class="outer-wrap">
            <canvas id="reelsCanvas" width="1080" height="1920"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── DESIGN SYSTEM ───────────────────────────────────────────────
const C = { PINK:'#ED0A73', BLUE:'#339AE9', WHITE:'#FFFFFF', BG:'#061525', BORDER:'#1a3a5c', MUTED:'#5a8ab0', DIM:'#2d4a63' };

function easeOut(t) { return 1 - Math.pow(1 - Math.min(Math.max(t,0),1), 3); }
function easeOutBack(t) { const c=1.3; t=Math.min(Math.max(t,0),1); return 1+c*(Math.pow(t-1,3))+c*(Math.pow(t-1,2)); }
function lerp(a,b,t) { return a+(b-a)*t; }
function countUp(raw,p) { const s=String(raw).trim(); const m=s.match(/^([^0-9\-]*)(-?[0-9]+(?:\.[0-9]+)?)(.*)$/); if(!m) return s; const[,pre,numStr,suf]=m; const cur=parseFloat(numStr)*easeOut(p); const dec=numStr.includes('.')?numStr.split('.')[1].length:0; return pre+cur.toFixed(dec)+suf; }
function fitText(ctx,text,maxW,size,weight,family) { ctx.font=`${weight} ${size}px ${family}`; while(ctx.measureText(text).width>maxW&&size>10){size-=2;ctx.font=`${weight} ${size}px ${family}`;} return size; }
const imgCache={};
function loadImg(url,cb) { if(!url){cb(null);return;} if(imgCache[url]!==undefined){cb(imgCache[url]);return;} const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{imgCache[url]=img;cb(img);};img.onerror=()=>{imgCache[url]=null;cb(null);};img.src=url; }
function drawCirclePhoto(ctx,img,cx,cy,r,borderColor,bw) { ctx.save();ctx.beginPath();ctx.arc(cx,cy,r+bw,0,Math.PI*2);ctx.fillStyle=borderColor;ctx.fill();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();if(img){const sc=Math.max((r*2)/img.width,(r*2)/img.height);ctx.drawImage(img,cx-img.width*sc/2,cy-img.height*sc/2,img.width*sc,img.height*sc);}else{ctx.fillStyle='#0d2a47';ctx.fill();}ctx.restore(); }
function roundRect(ctx,x,y,w,h,r) { const rad=typeof r==='number'?{tl:r,tr:r,br:r,bl:r}:{tl:r[0]||0,tr:r[1]||0,br:r[2]||0,bl:r[3]||0}; ctx.beginPath(); ctx.moveTo(x+rad.tl,y); ctx.lineTo(x+w-rad.tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+rad.tr); ctx.lineTo(x+w,y+h-rad.br); ctx.quadraticCurveTo(x+w,y+h,x+w-rad.br,y+h); ctx.lineTo(x+rad.bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-rad.bl); ctx.lineTo(x,y+rad.tl); ctx.quadraticCurveTo(x,y,x+rad.tl,y); ctx.closePath(); }

// ─── LAYOUT ──────────────────────────────────────────────────────
function getLayout(fmt) {
  if (fmt === 'square') return {
    W:1080, H:1080, borderH:6,
    titleY:70, titleSz:24,
    cardStartY:130, cardH:140, cardGap:10,
    photoR:48, photoOffX:64,
    nameX:138, nameSz:22,
    teamX:138, teamSz:14,
    rankBadgeR:28, rankX:1020,
    barStartX:138, barMaxW:640, barH:14, barY_offset:0.72,
    valX:820, valSz:32,
    footY:1052, footSz:16
  };
  return {
    W:1080, H:1920, safeTop:250, safeBottom:1620, borderH:8,
    titleY:316, titleSz:28,
    cardStartY:400, cardH:180, cardGap:14,
    photoR:62, photoOffX:80,
    nameX:175, nameSz:28,
    teamX:175, teamSz:17,
    rankBadgeR:34, rankX:1020,
    barStartX:175, barMaxW:640, barH:18, barY_offset:0.74,
    valX:850, valSz:38,
    footY:1862, footSz:18
  };
}

// ─── STATE ───────────────────────────────────────────────────────
let currentType = 'scrambled';
let animFrameId = null;
let currentFrame = 0;
const TOTAL_FRAMES_SCRAMBLED = 280;
const TOTAL_FRAMES_SORTED = 300;
let recorders = {};
let recChunks = {};
let isRecording = {};
let playerImages = [];

function switchType(t) {
  currentType = t;
  document.querySelectorAll('#typeToggle button').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&t==='scrambled')||(i===1&&t==='sorted'));
  });
  generate();
}

function updatePlayerRows() {
  const n = parseInt(document.getElementById('numPlayers').value);
  for (let i = 0; i < 6; i++) {
    const row = document.getElementById(`prow-${i}`);
    if (row) row.style.display = i < n ? '' : 'none';
  }
}

// ─── DATA ────────────────────────────────────────────────────────
function parseNum(s) {
  return parseFloat(String(s).replace(/[^0-9.\-]/g,'')) || 0;
}

function getData() {
  const n = parseInt(document.getElementById('numPlayers').value);
  const rawPlayers = [];
  for (let i = 0; i < n; i++) {
    const name = document.getElementById(`p${i}-name`)?.value.trim().toUpperCase() || '';
    const team = document.getElementById(`p${i}-team`)?.value.trim().toUpperCase() || '';
    const val = document.getElementById(`p${i}-val`)?.value.trim() || '0';
    const photoId = document.getElementById(`p${i}-photo`)?.value.trim() || '';
    const photoUrl = photoId
      ? (photoId.startsWith('http') ? photoId : `https://a.espncdn.com/i/headshots/nfl/players/full/${photoId}.png`)
      : '';
    rawPlayers.push({ name, team, value: val, numVal: parseNum(val), photoUrl, origIdx: i });
  }

  // sorted copy (descending by numVal)
  const sortedPlayers = [...rawPlayers].sort((a,b) => b.numVal - a.numVal);
  // add rank to each
  sortedPlayers.forEach((p, i) => { p.rank = i + 1; });
  // propagate rank back to rawPlayers by origIdx
  const rankMap = {};
  sortedPlayers.forEach(p => { rankMap[p.origIdx] = p.rank; });
  rawPlayers.forEach(p => { p.rank = rankMap[p.origIdx]; });

  const maxVal = sortedPlayers.length > 0 ? sortedPlayers[0].numVal : 1;

  return {
    statLabel: document.getElementById('statLabel').value.trim().toUpperCase(),
    rawPlayers,
    sortedPlayers,
    maxVal,
    n,
    attribution: document.getElementById('attribution').value.trim(),
  };
}

// ─── DRAWING ─────────────────────────────────────────────────────
function drawBg(ctx, L) {
  ctx.fillStyle = C.BG;
  ctx.fillRect(0, 0, L.W, L.H);
  // Top border pink
  ctx.fillStyle = C.PINK;
  ctx.fillRect(0, 0, L.W, L.borderH);
  // Subtle top glow
  const gl = ctx.createLinearGradient(0, L.borderH, 0, L.borderH + 120);
  gl.addColorStop(0, 'rgba(237,10,115,0.06)');
  gl.addColorStop(1, 'rgba(237,10,115,0)');
  ctx.fillStyle = gl;
  ctx.fillRect(0, L.borderH, L.W, 120);
}

function drawTitle(ctx, L, progress, label) {
  if (progress <= 0) return;
  ctx.save();
  ctx.globalAlpha = easeOut(progress);
  ctx.translate(0, lerp(-24, 0, easeOut(progress)));
  // "RANK THESE BY" line
  ctx.font = `500 ${Math.round(L.titleSz * 0.6)}px Roboto`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = C.MUTED;
  ctx.fillText('RANK THESE BY', L.W/2, L.titleY - Math.round(L.titleSz*0.5));
  // Stat label line
  const sz = fitText(ctx, label, L.W - 100, L.titleSz, '700', 'Oswald');
  ctx.font = `700 ${sz}px Oswald`;
  ctx.fillStyle = C.WHITE;
  ctx.fillText(label, L.W/2, L.titleY + Math.round(L.titleSz*0.4));
  ctx.restore();
}

function drawPlayerCard(ctx, L, idx, player, mode, progress, barProgress) {
  if (progress <= 0) return;
  const rank = player.rank;
  const y = L.cardStartY + idx * (L.cardH + L.cardGap);
  const W = L.W;
  const cardH = L.cardH;
  const padX = 30;
  const cardW = W - padX * 2;

  ctx.save();
  ctx.globalAlpha = easeOut(progress);
  ctx.translate(lerp(-60, 0, easeOut(progress)), 0);

  // Card bg
  ctx.fillStyle = idx % 2 === 0 ? 'rgba(13,42,71,0.65)' : 'rgba(13,42,71,0.35)';
  roundRect(ctx, padX, y, cardW, cardH, 10); ctx.fill();

  // Left color accent
  const accentColor = rank === 1 ? C.PINK : rank === 2 ? C.BLUE : C.BORDER;
  ctx.fillStyle = accentColor;
  ctx.globalAlpha = easeOut(progress) * (rank <= 2 ? 0.8 : 0.4);
  roundRect(ctx, padX, y, 5, cardH, [10,0,0,10]); ctx.fill();
  ctx.globalAlpha = easeOut(progress);

  // Photo
  const photoCX = padX + L.photoOffX;
  const photoCY = y + cardH / 2;
  const borderColor = rank === 1 ? C.PINK : rank === 2 ? C.BLUE : C.BORDER;
  drawCirclePhoto(ctx, player.img || null, photoCX, photoCY, L.photoR, borderColor, 3);

  // Name
  const nSz = fitText(ctx, player.name, cardW - 280, L.nameSz, '700', 'Oswald');
  ctx.font = `700 ${nSz}px Oswald`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = C.WHITE;
  ctx.fillText(player.name, padX + L.nameX, y + cardH * 0.18);

  // Team
  ctx.font = `400 ${L.teamSz}px Roboto`;
  ctx.fillStyle = C.MUTED;
  ctx.globalAlpha = easeOut(progress) * 0.7;
  ctx.fillText(player.team, padX + L.teamX, y + cardH * 0.46);
  ctx.globalAlpha = easeOut(progress);

  // Stat bar (sorted mode only)
  if (mode === 'sorted' && barProgress > 0) {
    const maxVal = L._maxVal || 1;
    const fraction = maxVal > 0 ? player.numVal / maxVal : 0;
    const barY = y + cardH * L.barY_offset;
    const barW = L.barMaxW * fraction * easeOut(barProgress);
    // Bar background
    ctx.fillStyle = 'rgba(26,58,92,0.6)';
    roundRect(ctx, padX + L.barStartX, barY, L.barMaxW, L.barH, L.barH/2); ctx.fill();
    // Bar fill
    const barColor = rank === 1 ? C.PINK : rank === 2 ? C.BLUE : 'rgba(90,138,176,0.7)';
    ctx.fillStyle = barColor;
    roundRect(ctx, padX + L.barStartX, barY, Math.max(barW, L.barH), L.barH, L.barH/2); ctx.fill();
    // Stat value
    ctx.font = `700 ${L.valSz}px Oswald`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillStyle = rank === 1 ? C.PINK : rank === 2 ? C.BLUE : C.WHITE;
    ctx.globalAlpha = easeOut(progress) * easeOut(barProgress);
    ctx.fillText(player.value, padX + L.valX, y + cardH * 0.62);
    ctx.globalAlpha = easeOut(progress);
  }

  // Rank badge
  const badgeCX = padX + L.rankX - 30;
  const badgeCY = y + cardH / 2;
  const badgeColor = rank === 1 ? C.PINK : rank === 2 ? C.BLUE : C.MUTED;
  ctx.beginPath(); ctx.arc(badgeCX, badgeCY, L.rankBadgeR, 0, Math.PI*2);
  ctx.fillStyle = rank === 1 ? 'rgba(237,10,115,0.2)' : rank === 2 ? 'rgba(51,154,233,0.2)' : 'rgba(13,42,71,0.8)';
  ctx.fill();
  ctx.strokeStyle = badgeColor; ctx.lineWidth = 2; ctx.stroke();
  ctx.font = `700 ${Math.round(L.rankBadgeR * 0.9)}px Oswald`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = mode === 'scrambled' ? C.MUTED : badgeColor;
  ctx.fillText(mode === 'scrambled' ? '?' : '#' + rank, badgeCX, badgeCY + L.rankBadgeR * 0.05);

  ctx.restore();
}

function drawAttribution(ctx, L, progress, text) {
  if (progress <= 0 || !text) return;
  ctx.save();
  ctx.globalAlpha = easeOut(progress);
  ctx.font = `500 ${L.footSz}px Roboto`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = C.MUTED;
  ctx.fillText(text, L.W/2, L.footY);
  ctx.restore();
}

// ─── RENDER FRAME ────────────────────────────────────────────────
function renderFrame(ctx, L, frame, data) {
  const type = currentType;
  const TF = type === 'scrambled' ? TOTAL_FRAMES_SCRAMBLED : TOTAL_FRAMES_SORTED;
  const f = frame;

  drawBg(ctx, L);
  L._maxVal = data.maxVal;

  function prog(start, end) { return Math.min(Math.max((f - start) / (end - start), 0), 1); }

  if (type === 'scrambled') {
    // Title
    drawTitle(ctx, L, prog(0, 40), data.statLabel);
    // Cards stagger in original order
    data.rawPlayers.forEach((player, i) => {
      const cardStart = 50 + i * 20;
      const cardEnd = cardStart + 40;
      drawPlayerCard(ctx, L, i, player, 'scrambled', prog(cardStart, cardEnd), 0);
    });
    drawAttribution(ctx, L, prog(250, 280), data.attribution);
  } else {
    // Sorted mode — display in sorted order
    drawTitle(ctx, L, prog(0, 40), data.statLabel);
    data.sortedPlayers.forEach((player, i) => {
      const cardStart = 50 + i * 20;
      const cardEnd = cardStart + 40;
      const barStart = cardStart + 40;
      const barEnd = barStart + 50;
      drawPlayerCard(ctx, L, i, player, 'sorted', prog(cardStart, cardEnd), prog(barStart, barEnd));
    });
    drawAttribution(ctx, L, prog(270, 300), data.attribution);
  }
}

// ─── LOAD IMAGES ─────────────────────────────────────────────────
function loadAllImages(players, cb) {
  let pending = players.length;
  if (pending === 0) { cb(); return; }
  players.forEach(p => {
    loadImg(p.photoUrl, img => {
      p.img = img;
      pending--;
      if (pending === 0) cb();
    });
  });
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────
let lastDataKey = '';

function generate() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  currentFrame = 0;

  const data = getData();
  const allPlayers = [...data.rawPlayers];
  // Pre-attach cached imgs
  allPlayers.forEach(p => { p.img = imgCache[p.photoUrl] || null; });
  data.rawPlayers.forEach(p => { p.img = imgCache[p.photoUrl] || null; });
  data.sortedPlayers.forEach(p => { p.img = imgCache[p.photoUrl] || null; });

  loadAllImages(allPlayers, () => {
    // Sync imgs back to data arrays
    allPlayers.forEach(p => {
      data.rawPlayers[p.origIdx].img = p.img;
    });
    data.sortedPlayers.forEach(p => {
      p.img = allPlayers[p.origIdx].img;
    });
    animate(data);
  });
}

function animate(data) {
  const TF = currentType === 'scrambled' ? TOTAL_FRAMES_SCRAMBLED : TOTAL_FRAMES_SORTED;
  const ctxSq = document.getElementById('squareCanvas').getContext('2d');
  const ctxRe = document.getElementById('reelsCanvas').getContext('2d');
  const LSq = getLayout('square');
  const LRe = getLayout('reels');

  renderFrame(ctxSq, LSq, currentFrame, data);
  renderFrame(ctxRe, LRe, currentFrame, data);

  if (currentFrame < TF) {
    currentFrame++;
    animFrameId = requestAnimationFrame(() => animate(data));
  } else {
    animFrameId = null;
  }
}

// ─── SCALE CANVASES ──────────────────────────────────────────────
function scaleCanvases() {
  const avail = Math.max(window.innerWidth - 480, 280);
  const sq = Math.min(0.39, (avail * 0.47) / 1080);
  const re = sq * (1080 / 1920) * 0.86;
  applyScale('squareOuter', sq, 1080, 1080);
  applyScale('reelsOuter', re, 1080, 1920);
}
function applyScale(id, s, w, h) {
  const el = document.getElementById(id);
  el.style.transform = `scale(${s})`;
  el.style.transformOrigin = 'top left';
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  el.parentElement.style.width = Math.round(w * s) + 'px';
  el.parentElement.style.height = Math.round(h * s) + 'px';
}

// ─── EXPORT PNG ──────────────────────────────────────────────────
function exportPNG(fmt) {
  const data = getData();
  const allPlayers = [...data.rawPlayers];
  allPlayers.forEach(p => { p.img = imgCache[p.photoUrl] || null; });
  data.rawPlayers.forEach(p => { p.img = imgCache[p.photoUrl] || null; });
  data.sortedPlayers.forEach(p => { p.img = data.rawPlayers[p.origIdx]?.img || null; });

  const canvas = document.getElementById(fmt === 'square' ? 'squareCanvas' : 'reelsCanvas');
  const ctx = canvas.getContext('2d');
  const L = getLayout(fmt);
  const TF = currentType === 'scrambled' ? TOTAL_FRAMES_SCRAMBLED : TOTAL_FRAMES_SORTED;
  renderFrame(ctx, L, TF, data);
  const a = document.createElement('a');
  a.download = `stat-sort-${fmt}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ─── VIDEO RECORDING ─────────────────────────────────────────────
function toggleRecord(fmt) {
  if (isRecording[fmt]) {
    stopRecord(fmt);
  } else {
    startRecord(fmt);
  }
}

function startRecord(fmt) {
  const canvas = document.getElementById(fmt === 'square' ? 'squareCanvas' : 'reelsCanvas');
  const mime = ['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm'].find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
  const ext = mime.startsWith('video/mp4') ? 'mp4' : 'webm';
  const stream = canvas.captureStream(30);
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 25_000_000 });
  recChunks[fmt] = [];
  rec.ondataavailable = e => { if (e.data.size > 0) recChunks[fmt].push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(recChunks[fmt], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const filename = `stat-sort-${fmt}.${ext}`;
    a.download = filename;
    a.href = url; a.click();
    URL.revokeObjectURL(url);
    showFFmpegModal(filename, 30);
    setBadge(fmt, false);
  };
  rec.start();
  recorders[fmt] = rec;
  isRecording[fmt] = true;
  setBadge(fmt, true);
  generate();
  const TF = currentType === 'scrambled' ? TOTAL_FRAMES_SCRAMBLED : TOTAL_FRAMES_SORTED;
  setTimeout(() => { if (isRecording[fmt]) stopRecord(fmt); }, (TF / 30) * 1000 + 500);
}

function stopRecord(fmt) {
  if (recorders[fmt] && recorders[fmt].state === 'recording') {
    recorders[fmt].stop();
  }
  isRecording[fmt] = false;
}

function setBadge(fmt, active) {
  const badge = document.getElementById(`recBadge-${fmt}`);
  if (!badge) return;
  badge.className = 'rec-badge ' + (active ? 'rec-active' : 'rec-idle');
}

// ─── DEBOUNCE ────────────────────────────────────────────────────
let debTimer = null;
function debouncedGenerate() {
  clearTimeout(debTimer);
  debTimer = setTimeout(generate, 220);
}

// ─── INIT ────────────────────────────────────────────────────────
function init() {
  updatePlayerRows();
  scaleCanvases();
  window.addEventListener('resize', scaleCanvases);
  generate();
}

document.addEventListener('DOMContentLoaded', init);

// ─── FFmpeg Conversion Modal ──────────────────────────────────────────────────
function showFFmpegModal(filename, fps) {
  const base = filename.replace(/\.(webm|mp4)$/, '');
  const ext  = filename.split('.').pop();
  const out  = base + '-davinci.mp4';
  const cmd  = `ffmpeg -i "${filename}" \\\n  -c:v libx264 \\\n  -profile:v high \\\n  -level:v 4.2 \\\n  -pix_fmt yuv420p \\\n  -crf 18 \\\n  -r ${fps} \\\n  -c:a aac \\\n  -movflags +faststart \\\n  "${out}"`;
  document.getElementById('ffmpeg-codec-note').textContent = ext.toUpperCase() + ' (' + (ext === 'webm' ? 'VP9' : 'H.264') + ')';
  document.getElementById('ffmpeg-cmd-block').textContent = cmd;
  document.getElementById('ffmpeg-modal').classList.add('open');
}
</script>

<!-- FFmpeg Conversion Modal -->
<div id="ffmpeg-modal" role="dialog" aria-modal="true">
  <div id="ffmpeg-modal-box">
    <h3>Convert for DaVinci Resolve</h3>
    <p>Your browser exported this as <strong id="ffmpeg-codec-note"></strong>. Run this FFmpeg command to make it DaVinci Resolve-compatible (H.264 / High profile):</p>
    <pre id="ffmpeg-cmd-block"></pre>
    <div id="ffmpeg-modal-btns">
      <button class="ffmpeg-btn ffmpeg-btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('ffmpeg-cmd-block').textContent).then(()=>{this.textContent='Copied!';setTimeout(()=>{this.textContent='Copy Command'},1500)})">Copy Command</button>
      <button class="ffmpeg-btn ffmpeg-btn-dismiss" onclick="document.getElementById('ffmpeg-modal').classList.remove('open')">Dismiss</button>
    </div>
  </div>
</div>
</body>
